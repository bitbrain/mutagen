name: Deploy

on:
  push:
    branches:
      - "main"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"
  ITCHIO_GAME: "mutagen"
  ITCHIO_USERNAME: "bitbrain"

jobs:
  import-assets:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.6.3

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot imported assets
        id: godot-import-cache
        uses: actions/cache@v4
        with:
          path: |
            .godot/imported
            .godot/uid_cache.bin
          key: >-
            godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{
              hashFiles(
                'project.godot',
                'export_presets.cfg',
                '**/*.import',
                '**/*.png',
                '**/*.jpg',
                '**/*.jpeg',
                '**/*.webp',
                '**/*.svg',
                '**/*.ogg',
                '**/*.wav',
                '**/*.mp3',
                '**/*.ttf',
                '**/*.otf',
                '**/*.glb',
                '**/*.gltf',
                '**/*.fbx',
                '**/*.blend'
              )
            }}
          restore-keys: |
            godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-
            godot-import-${{ runner.os }}-

      - name: Import assets
        if: steps.godot-import-cache.outputs.cache-hit != 'true'
        run: godot --headless --verbose --editor --quit

  export-game:
    runs-on: ubuntu-latest
    needs: import-assets

    steps:
      - uses: actions/checkout@v4

      - name: Restore Godot imported assets
        uses: actions/cache@v4
        with:
          path: |
            .godot/imported
            .godot/uid_cache.bin
          key: >-
            godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{
              hashFiles(
                'project.godot',
                'export_presets.cfg',
                '**/*.import',
                '**/*.png',
                '**/*.jpg',
                '**/*.jpeg',
                '**/*.webp',
                '**/*.svg',
                '**/*.ogg',
                '**/*.wav',
                '**/*.mp3',
                '**/*.ttf',
                '**/*.otf',
                '**/*.glb',
                '**/*.gltf',
                '**/*.fbx',
                '**/*.blend'
              )
            }}
          restore-keys: |
            godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-
            godot-import-${{ runner.os }}-

      - name: Install Wine
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine64
          echo "WINE_PATH=$(which wine64)" >> "$GITHUB_ENV"

      - name: Export Game using Godot
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz"
          archive_output: true
          cache: true
          wine_path: ${{ env.WINE_PATH }}

      - name: Collect archives
        run: |
          mkdir -p dist
          cp /home/runner/.local/share/godot/archives/*.zip dist/
          ls -lah dist

      - name: Upload builds
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: dist/*.zip
          if-no-files-found: error
          compression-level: 0

  deploy-to-itchio:
    runs-on: ubuntu-latest
    needs: export-game

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: Linux
            channel: linux
            package: LinuxX11.zip
          - name: Windows
            channel: windows
            package: Windows.zip
          - name: macOS
            channel: mac
            package: macOS.zip
          - name: HTML5
            channel: web
            package: HTML5.zip

    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: builds
          path: dist

      - name: Deploy to Itch.io (${{ matrix.name }})
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ matrix.channel }}
          ITCH_GAME: ${{ env.ITCHIO_GAME }}
          ITCH_USER: ${{ env.ITCHIO_USERNAME }}
          PACKAGE: dist/${{ matrix.package }}